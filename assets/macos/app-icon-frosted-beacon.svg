<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tileBase" x1="512" y1="120" x2="512" y2="904" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4F7FA"/>
      <stop offset="0.42" stop-color="#D7DEE6"/>
      <stop offset="1" stop-color="#B3BECC"/>
    </linearGradient>
    <linearGradient id="tileGloss" x1="512" y1="120" x2="512" y2="460" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.82"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ringStroke" x1="512" y1="312" x2="512" y2="712" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8A99AA"/>
      <stop offset="1" stop-color="#6A7B90"/>
    </linearGradient>
    <radialGradient id="coreFill" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(512 512) rotate(90) scale(74)">
      <stop stop-color="#AAB7C5"/>
      <stop offset="1" stop-color="#73859A"/>
    </radialGradient>
    <filter id="shadow" x="96" y="96" width="832" height="832" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="26" stdDeviation="28" flood-color="#132033" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="120" y="120" width="784" height="784" rx="178" fill="url(#tileBase)"/>
    <rect x="120" y="120" width="784" height="784" rx="178" fill="url(#tileGloss)"/>
    <rect x="156" y="156" width="712" height="712" rx="144" stroke="#7C8DA1" stroke-opacity="0.18" stroke-width="2"/>
  </g>

  <circle cx="512" cy="512" r="284" stroke="#EEF3F8" stroke-opacity="0.72" stroke-width="8"/>
  <circle cx="512" cy="512" r="214" stroke="url(#ringStroke)" stroke-width="54"/>
  <circle cx="512" cy="512" r="66" fill="url(#coreFill)"/>
  <circle cx="512" cy="512" r="92" stroke="#F4F7FA" stroke-opacity="0.66" stroke-width="14"/>
