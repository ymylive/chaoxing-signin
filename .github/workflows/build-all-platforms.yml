name: Build All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.12.1

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm run prepack:build

      - name: Build Windows EXE
        run: |
          mkdir -p dist
          pnpm dlx pkg@5.8.1 -t node18-win-x64 -o dist/Chaoxing.exe . --assets "apps/server/build/**/*" --assets "apps/web/dist/**/*" --assets "apps/server/src/configs/**/*" --assets "apps/server/src/env.json"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/Chaoxing.exe

  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.12.1

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm run prepack:build

      - name: Build macOS executable
        run: |
          mkdir -p dist
          pnpm dlx pkg@5.8.1 -t node18-macos-x64 -o dist/Chaoxing-macos . --assets "apps/server/build/**/*" --assets "apps/web/dist/**/*" --assets "apps/server/src/configs/**/*" --assets "apps/server/src/env.json"
          chmod +x dist/Chaoxing-macos

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-executable
          path: dist/Chaoxing-macos

  build-android:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.12.1

      - name: Install dependencies
        run: pnpm install

      - name: Build web app
        run: pnpm -C apps/web build

      - name: Install Capacitor
        working-directory: apps/web
        run: pnpm add @capacitor/core @capacitor/cli @capacitor/android

      - name: Initialize Capacitor
        working-directory: apps/web
        run: |
          pnpm exec cap init "超星学习通签到" "com.chaoxing.signin" --web-dir=dist

      - name: Add Android platform
        working-directory: apps/web
        run: pnpm exec cap add android

      - name: Sync Capacitor
        working-directory: apps/web
        run: pnpm exec cap sync android

      - name: Build Android APK
        working-directory: apps/web/android
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          cd apps/web/android/app/build/outputs/apk/release
          mv app-release-unsigned.apk chaoxing-signin.apk 2>/dev/null || mv app-release.apk chaoxing-signin.apk 2>/dev/null || true

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/web/android/app/build/outputs/apk/release/*.apk

  create-release:
    name: Create Release
    needs: [build-windows, build-macos, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Display structure
        run: ls -R ./artifacts

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./artifacts/windows-exe/Chaoxing.exe
            ./artifacts/macos-executable/Chaoxing-macos
            ./artifacts/android-apk/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
