name: Build All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.12.1

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm run prepack:build

      - name: Build Windows EXE
        run: |
          mkdir -p dist
          pnpm dlx pkg@5.8.1 -t node18-win-x64 -o dist/Chaoxing.exe .

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/Chaoxing.exe

  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.12.1

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm run prepack:build

      - name: Build macOS executables (Intel and Apple Silicon)
        run: |
          mkdir -p dist

          # Build for Intel (x64)
          echo "Building for Intel (x64)..."
          pnpm dlx pkg@5.8.1 -t node18-macos-x64 -o dist/chaoxing-macos-x64.bin .

          # Build for Apple Silicon (arm64)
          echo "Building for Apple Silicon (arm64)..."
          pnpm dlx pkg@5.8.1 -t node18-macos-arm64 -o dist/chaoxing-macos-arm64.bin .

          # Create shell wrappers
          echo "Creating shell wrappers..."

          # Universal wrapper
          printf '%s\n' \
            '#!/bin/bash' \
            'SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"' \
            'ARCH="$(uname -m)"' \
            'if [ "$ARCH" = "arm64" ]; then' \
            '  exec "$SCRIPT_DIR/chaoxing-macos-arm64.bin" "$@"' \
            'fi' \
            'exec "$SCRIPT_DIR/chaoxing-macos-x64.bin" "$@"' \
            > dist/Chaoxing-macos

          # Intel wrapper
          printf '%s\n' \
            '#!/bin/bash' \
            'SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"' \
            'exec "$SCRIPT_DIR/chaoxing-macos-x64.bin" "$@"' \
            > dist/Chaoxing-macos-x64

          # ARM wrapper
          printf '%s\n' \
            '#!/bin/bash' \
            'SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"' \
            'exec "$SCRIPT_DIR/chaoxing-macos-arm64.bin" "$@"' \
            > dist/Chaoxing-macos-arm64

          # Make everything executable
          chmod +x dist/*.bin dist/Chaoxing-macos*

          # Remove extended attributes
          xattr -cr dist/*.bin dist/Chaoxing-macos* || true

          # Package self-contained CLI archives for GitHub Releases
          tar -czf dist/Chaoxing-macos.tar.gz -C dist Chaoxing-macos chaoxing-macos-arm64.bin chaoxing-macos-x64.bin
          tar -czf dist/Chaoxing-macos-x64.tar.gz -C dist Chaoxing-macos-x64 chaoxing-macos-x64.bin
          tar -czf dist/Chaoxing-macos-arm64.tar.gz -C dist Chaoxing-macos-arm64 chaoxing-macos-arm64.bin

          ls -lh dist/

      - name: Create macOS App Bundle
        run: |
          chmod +x scripts/build-macos-app.sh
          bash scripts/build-macos-app.sh
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_CERTIFICATE_NAME: ${{ secrets.MACOS_CERTIFICATE_NAME }}

      - name: Upload macOS Universal App
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal-app
          path: dist/Chaoxing-macos.dmg

      - name: Upload macOS Universal Binary
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal-binary
          path: dist/Chaoxing-macos.tar.gz

      - name: Upload macOS Intel Binary
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel-binary
          path: dist/Chaoxing-macos-x64.tar.gz

      - name: Upload macOS ARM Binary
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm-binary
          path: dist/Chaoxing-macos-arm64.tar.gz

  build-android:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.12.1

      - name: Install dependencies
        run: pnpm install

      - name: Build web app
        run: pnpm -C apps/web build

      - name: Install Capacitor
        working-directory: apps/web
        run: pnpm add @capacitor/core @capacitor/cli @capacitor/android

      - name: Initialize Capacitor
        working-directory: apps/web
        run: |
          pnpm exec cap init "超星学习通签到" "com.chaoxing.signin" --web-dir=dist

      - name: Add Android platform
        working-directory: apps/web
        run: pnpm exec cap add android

      - name: Sync Capacitor
        working-directory: apps/web
        run: pnpm exec cap sync android

      - name: Build Android APK
        working-directory: apps/web/android
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          cd apps/web/android/app/build/outputs/apk/release
          mv app-release-unsigned.apk chaoxing-signin.apk 2>/dev/null || mv app-release.apk chaoxing-signin.apk 2>/dev/null || true

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/web/android/app/build/outputs/apk/release/*.apk

  create-release:
    name: Create Release
    needs: [build-windows, build-macos, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Display structure
        run: ls -R ./artifacts

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./artifacts/windows-exe/Chaoxing.exe
            ./artifacts/macos-universal-app/Chaoxing-macos.dmg
            ./artifacts/macos-universal-binary/Chaoxing-macos.tar.gz
            ./artifacts/macos-intel-binary/Chaoxing-macos-x64.tar.gz
            ./artifacts/macos-arm-binary/Chaoxing-macos-arm64.tar.gz
            ./artifacts/android-apk/*.apk
          draft: false
          prerelease: false
          body: |
            ## 超星学习通签到 - 多平台版本

            ### 📦 下载说明

            #### Windows 用户
            - 下载 `Chaoxing.exe`
            - 右键选择"以管理员身份运行"
            - 浏览器自动打开 http://localhost:5000

            #### macOS 用户

            **推荐下载：**
            - **Chaoxing-macos.dmg** - Universal App（同时支持Intel和Apple Silicon）
              1. 双击打开 DMG 文件
              2. 将应用拖到"应用程序"文件夹
              3. 首次运行时，右键点击应用选择"打开"

            **命令行版本：**
            - **Chaoxing-macos.tar.gz** - Universal CLI（推荐，支持所有Mac）
            - **Chaoxing-macos-x64.tar.gz** - 仅Intel芯片
            - **Chaoxing-macos-arm64.tar.gz** - 仅Apple Silicon (M1/M2/M3)

            **如何选择：**
            - 不确定？下载 Universal Binary 版本
            - M1/M2/M3 芯片：所有版本都支持
            - Intel 芯片：下载 Universal 或 x64 版本

            **安装步骤：**
            ```bash
            # 下载并解压后
            tar -xzf Chaoxing-macos.tar.gz
            chmod +x Chaoxing-macos
            xattr -cr Chaoxing-macos
            ./Chaoxing-macos
            ```

            #### Android 用户
            - 下载 `chaoxing-signin.apk`
            - 允许安装未知来源应用
            - 安装并打开应用

            ### 💻 检查你的Mac芯片类型

            打开终端运行：
            ```bash
            uname -m
            ```
            - 输出 `arm64` = Apple Silicon (M1/M2/M3)
            - 输出 `x86_64` = Intel

            或者：点击左上角  > "关于本机" > 查看"芯片"或"处理器"

            ### ⚠️ macOS 安全提示

            如果遇到"无法打开，因为无法验证开发者"的提示：
            1. 打开"系统偏好设置" > "安全性与隐私"
            2. 点击"仍要打开"
            3. 或在终端运行: `sudo xattr -rd com.apple.quarantine /Applications/超星学习通签到.app`

            详细说明请查看 [macOS安装指南.md](https://github.com/ymylive/chaoxing-signin/blob/main/macOS安装指南.md)

            ### 🔐 代码签名

            - Windows: 未签名
            - macOS: ${{ secrets.MACOS_CERTIFICATE && '已签名' || '未签名' }}
            - Android: 未签名（开发版）

            ### 📝 更新内容

            - ✅ 支持 Apple Silicon (M1/M2/M3) 芯片
            - ✅ 提供 Universal Binary（同时支持Intel和ARM）
            - ✅ 优化 macOS 安装体验
            - ✅ 详细的安装和故障排除文档

            查看完整更新日志：[CHANGELOG.md](https://github.com/ymylive/chaoxing-signin/blob/main/CHANGELOG.md)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
