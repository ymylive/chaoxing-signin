name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows Portable
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.12.1

      - name: Create pnpm-workspace.yaml
        run: |
          echo "packages:" > pnpm-workspace.yaml
          echo "  - 'apps/*'" >> pnpm-workspace.yaml
          echo "  - 'packages/*'" >> pnpm-workspace.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm run prepack:build

      - name: Build Windows EXE
        run: pnpm run win:build-exe

      - name: Create portable package
        run: |
          mkdir portable
          copy dist\Chaoxing.exe portable\
          copy README.md portable\
          copy 便携版完整说明.md portable\
          copy Windows使用说明.md portable\
          copy START.bat portable\
          copy START-ADMIN.bat portable\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chaoxing-portable-windows
          path: portable/

      - name: Upload Windows artifact to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/Chaoxing.exe

  build-macos:
    name: Build macOS Portable
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.12.1

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm run prepack:build

      - name: Build macOS executable
        run: |
          mkdir -p dist
          pnpm dlx pkg@5.8.1 -t node18-macos-x64 -o dist/Chaoxing-macos . \
            --assets "apps/server/build/**/*" \
            --assets "apps/web/dist/**/*" \
            --assets "apps/server/src/configs/**/*" \
            --assets "apps/server/src/env.json"

      - name: Make executable
        run: chmod +x dist/Chaoxing-macos

      - name: Upload macOS artifact to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: macos-executable
          path: dist/Chaoxing-macos

  create-release:
    name: Create Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: ./artifacts/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-executable
          path: ./artifacts/macos

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./artifacts/windows/Chaoxing.exe
            ./artifacts/macos/Chaoxing-macos
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
