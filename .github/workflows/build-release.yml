name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows Portable
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.12.1

      - name: Create pnpm-workspace.yaml
        run: |
          echo "packages:" > pnpm-workspace.yaml
          echo "  - 'apps/*'" >> pnpm-workspace.yaml
          echo "  - 'packages/*'" >> pnpm-workspace.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm run prepack:build

      - name: Build Windows EXE
        run: pnpm run win:build-exe

      - name: Create portable package
        run: |
          mkdir portable
          copy dist\Chaoxing.exe portable\
          copy README.md portable\
          copy 便携版完整说明.md portable\
          copy Windows使用说明.md portable\
          copy START.bat portable\
          copy START-ADMIN.bat portable\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chaoxing-portable-windows
          path: portable/

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/Chaoxing.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
